training:
  modules:
    - name: "segmentation"
      enabled: true
      model: "unet_plusplus"
      loss: "dice_focal"
    
    - name: "landmark_detection"
      enabled: false
      model: "hrnet"
      loss: "mse"
  
  data:
    augmentation: "echo_specific_aug"
    batch_size: 8
  
  optimizer:
    type: "adamw"
    lr: 1e-4